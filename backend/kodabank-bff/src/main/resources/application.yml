server:
  port: ${SERVER_PORT:8085}

kodabank:
  core-url: ${KODABANK_CORE_URL:http://localhost:8086}
  clearing-url: ${KODABANK_CLEARING_URL:http://localhost:8087}
  admin-url: ${KODABANK_ADMIN_URL:http://localhost:8088}
  frontend-url: ${KODABANK_FRONTEND_URL:http://localhost:3100}
  bff-base-url: ${KODABANK_BFF_BASE_URL:http://localhost:8085}
  payment-gateway-url: ${KODABANK_PAYMENT_GATEWAY_URL:http://localhost:8089}

spring:
  application:
    name: kodabank-bff
  datasource:
    url: ${KODABANK_READMODEL_JDBC_URL:jdbc:postgresql://localhost:5433/kodabank_readmodel}
    username: ${KODABANK_READMODEL_DB_USER:kodabank}
    password: ${KODABANK_READMODEL_DB_PASSWORD:kodabank}
    driver-class-name: org.postgresql.Driver
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: ${SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/kodabank}
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
