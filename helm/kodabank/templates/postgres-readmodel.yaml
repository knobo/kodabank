apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kodabank.fullname" . }}-init-sql
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
data:
  init-readmodel.sql: |
    {{- .Files.Get "files/init-readmodel.sql" | nindent 4 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "kodabank.fullname" . }}-postgres-readmodel
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.postgres.readmodel.storage }}
  {{- include "kodabank.storageClass" . | nindent 2 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kodabank.fullname" . }}-postgres-readmodel
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "kodabank.selectorLabels" (dict "component" "postgres-readmodel" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kodabank.selectorLabels" (dict "component" "postgres-readmodel" "context" .) | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: postgres:17
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.readmodel.database }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.readmodel.username }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kodabank.fullname" . }}-postgres
                  key: readmodel-password
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: [pg_isready, -U, {{ .Values.postgres.readmodel.username }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "kodabank.fullname" . }}-postgres-readmodel
        - name: init-sql
          configMap:
            name: {{ include "kodabank.fullname" . }}-init-sql
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kodabank.fullname" . }}-postgres-readmodel
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "kodabank.selectorLabels" (dict "component" "postgres-readmodel" "context" .) | nindent 4 }}
  ports:
    - port: 5432
      targetPort: 5432
