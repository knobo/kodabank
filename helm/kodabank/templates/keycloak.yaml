apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kodabank.fullname" . }}-keycloak-realm
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
data:
  kodabank-realm.json: |
    {{- .Files.Get "files/realm-export.json" | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kodabank.fullname" . }}-keycloak
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.keycloak }}
  selector:
    matchLabels:
      {{- include "kodabank.selectorLabels" (dict "component" "keycloak" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kodabank.selectorLabels" (dict "component" "keycloak" "context" .) | nindent 8 }}
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.6
          args: [start-dev, --import-realm]
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://{{ include "kodabank.fullname" . }}-postgres-keycloak:5432/{{ .Values.postgres.keycloak.database }}
            - name: KC_DB_USERNAME
              value: {{ .Values.postgres.keycloak.username }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kodabank.fullname" . }}-postgres
                  key: keycloak-password
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.adminUser }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kodabank.fullname" . }}-keycloak
                  key: admin-password
            # Set the external hostname so JWT issuer URIs are correct
            - name: KC_HOSTNAME
              value: {{ .Values.keycloakHost }}
            - name: KC_HOSTNAME_STRICT
              value: "false"
            {{- if not .Values.ingress.tls.enabled }}
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            {{- end }}
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm
          configMap:
            name: {{ include "kodabank.fullname" . }}-keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kodabank.fullname" . }}-keycloak
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "kodabank.selectorLabels" (dict "component" "keycloak" "context" .) | nindent 4 }}
  ports:
    - port: 8080
      targetPort: 8080
