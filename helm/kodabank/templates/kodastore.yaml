apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kodabank.fullname" . }}-kodastore
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.kodastore }}
  selector:
    matchLabels:
      {{- include "kodabank.selectorLabels" (dict "component" "kodastore" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kodabank.selectorLabels" (dict "component" "kodastore" "context" .) | nindent 8 }}
    spec:
      containers:
        - name: kodastore
          image: {{ include "kodabank.image" (dict "name" "kodastore" "context" .) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://{{ include "kodabank.fullname" . }}-postgres-eventstore:5432/{{ .Values.postgres.eventstore.database }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.postgres.eventstore.username }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kodabank.fullname" . }}-postgres
                  key: eventstore-password
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kodabank.fullname" . }}-kodastore
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "kodabank.selectorLabels" (dict "component" "kodastore" "context" .) | nindent 4 }}
  ports:
    - port: 8080
      targetPort: 8080
