apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kodabank.fullname" . }}-clearing
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.clearing }}
  selector:
    matchLabels:
      {{- include "kodabank.selectorLabels" (dict "component" "clearing" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kodabank.selectorLabels" (dict "component" "clearing" "context" .) | nindent 8 }}
    spec:
      containers:
        - name: kodabank-clearing
          image: {{ include "kodabank.image" (dict "name" "kodabank-clearing" "context" .) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: SERVER_PORT
              value: "8087"
            - name: KODASTORE_URL
              value: http://{{ include "kodabank.fullname" . }}-kodastore:8080
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://{{ include "kodabank.fullname" . }}-postgres-readmodel:5432/{{ .Values.postgres.readmodel.database }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.postgres.readmodel.username }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kodabank.fullname" . }}-postgres
                  key: readmodel-password
          ports:
            - containerPort: 8087
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kodabank.fullname" . }}-clearing
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "kodabank.selectorLabels" (dict "component" "clearing" "context" .) | nindent 4 }}
  ports:
    - port: 8087
      targetPort: 8087
