apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kodabank.fullname" . }}-payment-gateway
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.paymentGateway }}
  selector:
    matchLabels:
      {{- include "kodabank.selectorLabels" (dict "component" "payment-gateway" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kodabank.selectorLabels" (dict "component" "payment-gateway" "context" .) | nindent 8 }}
    spec:
      containers:
        - name: kodabank-payment-gateway
          image: {{ include "kodabank.image" (dict "name" "kodabank-payment-gateway" "context" .) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: SERVER_PORT
              value: "8089"
            - name: KODASTORE_URL
              value: http://{{ include "kodabank.fullname" . }}-kodastore:8080
            - name: KODABANK_CORE_URL
              value: http://{{ include "kodabank.fullname" . }}-core:8086
          ports:
            - containerPort: 8089
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8089
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kodabank.fullname" . }}-payment-gateway
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "kodabank.selectorLabels" (dict "component" "payment-gateway" "context" .) | nindent 4 }}
  ports:
    - port: 8089
      targetPort: 8089
