apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kodabank.fullname" . }}-admin
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.admin }}
  selector:
    matchLabels:
      {{- include "kodabank.selectorLabels" (dict "component" "admin" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kodabank.selectorLabels" (dict "component" "admin" "context" .) | nindent 8 }}
    spec:
      {{- include "kodabank.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: kodabank-admin
          image: {{ include "kodabank.image" (dict "name" "kodabank-admin" "context" .) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: SERVER_PORT
              value: "8088"
            - name: KODASTORE_URL
              value: http://{{ include "kodabank.fullname" . }}-kodastore:8080
            - name: KEYCLOAK_URL
              value: http://{{ include "kodabank.fullname" . }}-keycloak:8080
            - name: KEYCLOAK_REALM
              value: {{ .Values.keycloak.realm }}
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kodabank.fullname" . }}-keycloak
                  key: client-secret
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: {{ include "kodabank.keycloakIssuerUri" . }}
          ports:
            - containerPort: 8088
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8088
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kodabank.fullname" . }}-admin
  labels:
    {{- include "kodabank.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "kodabank.selectorLabels" (dict "component" "admin" "context" .) | nindent 4 }}
  ports:
    - port: 8088
      targetPort: 8088
